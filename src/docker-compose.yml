services:
  postgres:
    image: postgres:17-alpine
    container_name: appanimaux-dev-postgres
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ChangeMe!
      POSTGRES_DB: identity_db
    ports:
      - "55432:5432"
    volumes:
      - appanimaux-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: appanimaux-dev-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: app_user
      RABBITMQ_DEFAULT_PASS: ChangeMe!
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - appanimaux-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  appanimaux-postgres-data:
  appanimaux-rabbitmq-data:
